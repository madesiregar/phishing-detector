<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Detector · Made Siregar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e080f;
    --bg2: #160d18;
    --bg3: #1e1022;
    --border: rgba(255,180,220,0.08);
    --border-active: rgba(255,150,200,0.25);
    --text: #f5e8f5;
    --text2: #c49abf;
    --text3: #7a5278;
    --pink: #f472b6;
    --pink2: #ec4899;
    --pink-bg: rgba(244,114,182,0.08);
    --pink-border: rgba(244,114,182,0.2);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.08);
    --green-border: rgba(74,222,128,0.2);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.08);
    --amber-border: rgba(251,191,36,0.2);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.08);
    --red-border: rgba(248,113,113,0.2);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(244,114,182,0.07) 0%, transparent 70%),
      linear-gradient(rgba(255,150,200,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,150,200,0.02) 1px, transparent 1px);
    background-size: 100% 100%, 40px 40px, 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 48px 24px 80px; }

  /* header */
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 40px; }
  .logo {
    width: 40px; height: 40px;
    background: var(--pink-bg);
    border: 1px solid var(--pink-border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 18px rgba(244,114,182,0.15);
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  header h1 span { color: var(--pink); }
  .made-by {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .made-by .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 0 6px var(--pink);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .stat-box:hover { border-color: var(--border-active); }
  .stat-box .s-label { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-box .s-val { font-size: 24px; font-weight: 600; font-family: var(--mono); }

  /* tabs */
  .tabs { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 20px; width: fit-content; }
  .tab { padding: 7px 20px; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text2); border: none; background: transparent; transition: all 0.15s; }
  .tab.active { background: var(--pink-bg); color: var(--pink); border: 1px solid var(--pink-border); }

  /* input */
  .input-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 16px; }
  .input-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); font-family: var(--mono); margin-bottom: 10px; display: block; }
  .url-row { display: flex; gap: 10px; }
  input[type="text"] { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; font-size: 14px; color: var(--text); font-family: var(--mono); outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--pink-border); box-shadow: 0 0 0 3px rgba(244,114,182,0.06); }
  input[type="text"]::placeholder { color: var(--text3); }
  textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--text); font-family: var(--mono); outline: none; resize: vertical; min-height: 140px; transition: border-color 0.2s; line-height: 1.6; }
  textarea:focus { border-color: var(--pink-border); box-shadow: 0 0 0 3px rgba(244,114,182,0.06); }
  textarea::placeholder { color: var(--text3); }

  .btn-scan {
    background: linear-gradient(135deg, #f472b6, #ec4899);
    color: #fff;
    border: none; border-radius: 10px;
    padding: 11px 22px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(236,72,153,0.25);
  }
  .btn-scan:hover { opacity: 0.88; }
  .btn-scan:active { transform: scale(0.97); }
  .btn-scan-full { width: 100%; margin-top: 12px; padding: 12px; }

  .examples { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .ex-label { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .pill { font-size: 11px; font-family: var(--mono); padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; background: transparent; transition: all 0.15s; }
  .pill:hover { border-color: var(--pink-border); color: var(--pink); }

  /* result */
  .result-card { border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .result-header { padding: 20px 22px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
  .verdict-badge { font-size: 11px; font-weight: 600; font-family: var(--mono); letter-spacing: 0.08em; padding: 5px 12px; border-radius: 6px; flex-shrink: 0; }
  .badge-safe        { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-suspicious  { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-phishing    { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border); }
  .result-meta { flex: 1; }
  .result-url { font-family: var(--mono); font-size: 13px; color: var(--text2); word-break: break-all; margin-bottom: 4px; }
  .result-summary { font-size: 13px; color: var(--text); }
  .score-ring { width: 56px; height: 56px; flex-shrink: 0; position: relative; }
  .score-ring svg { width: 56px; height: 56px; transform: rotate(-90deg); }
  .score-ring .track { fill: none; stroke: var(--bg3); stroke-width: 4; }
  .score-ring .fill  { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .score-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 15px; font-weight: 500; }
  .prog-wrap { padding: 0 22px 16px; }
  .prog-bg { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .findings { padding: 0 22px 20px; }
  .findings-title { font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .finding-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .finding-item { display: flex; align-items: flex-start; gap: 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .finding-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot-critical { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.5); }
  .dot-high { background: #fb923c; }
  .dot-medium { background: #fbbf24; }
  .dot-low { background: #6b7280; }
  .dot-ok { background: #4ade80; }
  .finding-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .finding-text strong { display: block; font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 2px; font-family: var(--mono); }

  /* history */
  .history { margin-top: 32px; }
  .history-title { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .history-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
  .history-row:hover { background: var(--bg2); border-color: var(--border); }
  .h-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .h-url { font-size: 12px; font-family: var(--mono); color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h-score { font-size: 11px; font-family: var(--mono); color: var(--text3); }
  .h-verdict { font-size: 10px; font-family: var(--mono); font-weight: 600; padding: 2px 8px; border-radius: 4px; }

  /* footer */
  footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
  }
  footer .heart { color: var(--pink); animation: pulse 2s ease-in-out infinite; font-size: 14px; }
  footer strong { color: var(--pink); font-weight: 500; }

  .loading { display: none; align-items: center; gap: 10px; padding: 18px 0; font-size: 13px; color: var(--text2); font-family: var(--mono); }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">🛡</div>
    <h1>Phishing <span>Detector</span></h1>
    <div class="made-by">
      <div class="dot"></div>
      made by Made Siregar
    </div>
  </header>

  <div class="stats">
    <div class="stat-box">
      <div class="s-label">Total scan</div>
      <div class="s-val" id="sTotal" style="color:var(--text)">0</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Aman</div>
      <div class="s-val" id="sSafe" style="color:var(--green)">0</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Curigai</div>
      <div class="s-val" id="sWarn" style="color:var(--amber)">0</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Phishing</div>
      <div class="s-val" id="sDanger" style="color:var(--red)">0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setMode('url')">URL / Domain</button>
    <button class="tab" onclick="setMode('email')">Email body</button>
  </div>

  <div class="input-card">
    <div id="modeUrl">
      <span class="input-label">Masukkan URL atau domain</span>
      <div class="url-row">
        <input type="text" id="urlInput" placeholder="https://example.com/login?verify=true" />
        <button class="btn-scan" onclick="doScan()">Scan →</button>
      </div>
      <div class="examples">
        <span class="ex-label">contoh:</span>
        <button class="pill" onclick="tryUrl('https://www.google.com')">google.com ✓</button>
        <button class="pill" onclick="tryUrl('http://paypa1-verify.tk/login?token=abc')">paypa1 phish</button>
        <button class="pill" onclick="tryUrl('http://192.168.1.1/bank/login.php')">IP langsung</button>
        <button class="pill" onclick="tryUrl('https://amazon-account-suspended.gq/verify')">amazon fake</button>
        <button class="pill" onclick="tryUrl('http://secure.update.micros0ft.login.xyz/auth')">microsoft fake</button>
      </div>
    </div>
    <div id="modeEmail" class="hidden">
      <span class="input-label">Paste isi email yang mencurigakan</span>
      <textarea id="emailInput" placeholder="Dear Customer, your account has been suspended due to unusual activity. Please verify immediately..."></textarea>
      <button class="btn-scan btn-scan-full" onclick="doScan()">Scan Email →</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Menganalisis...</span>
  </div>

  <div id="resultArea"></div>

  <div class="history hidden" id="historyArea">
    <div class="history-title">Riwayat scan</div>
    <div id="historyList"></div>
  </div>

  <footer>
    <span>built with</span>
    <span class="heart">♥</span>
    <span>by <strong>Made Siregar</strong></span>
    <span>·</span>
    <span>phishing-detector v1.0</span>
  </footer>

</div>
<script>
  let mode = 'url';
  const stats = { total: 0, safe: 0, suspicious: 0, phishing: 0 };
  const history = [];

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && m === 'url') || (i === 1 && m === 'email'));
    });
    document.getElementById('modeUrl').classList.toggle('hidden', m !== 'url');
    document.getElementById('modeEmail').classList.toggle('hidden', m !== 'email');
  }

  function tryUrl(url) {
    setMode('url');
    document.getElementById('urlInput').value = url;
    doScan();
  }

  async function doScan() {
    const input = mode === 'url'
      ? document.getElementById('urlInput').value.trim()
      : document.getElementById('emailInput').value.trim();
    if (!input) return;
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('resultArea').innerHTML = '';
    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, input })
      });
      const data = await res.json();
      renderResult(data, input);
      updateStats(data.verdict.toLowerCase());
      addHistory(input, data);
    } catch (e) {
      document.getElementById('resultArea').innerHTML =
        '<div style="color:var(--red);font-family:var(--mono);font-size:13px;padding:16px 0">Error: Pastikan Flask server berjalan di port 5000</div>';
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  function renderResult(data, input) {
    const v = data.verdict.toLowerCase();
    const colors = { safe: 'var(--green)', suspicious: 'var(--amber)', phishing: 'var(--red)' };
    const summaries = {
      safe: 'Tidak ditemukan indikator phishing yang signifikan.',
      suspicious: 'Terdapat beberapa pola mencurigakan. Berhati-hatilah.',
      phishing: 'URL/konten ini sangat mencurigakan. Jangan klik atau bagikan!'
    };
    const c = 88;
    const offset = c - ((data.score / 100) * c);
    const shortInput = input.length > 60 ? input.slice(0, 60) + '...' : input;
    const findingsHtml = (data.findings || []).map(([text, severity]) =>
      '<div class="finding-item"><div class="finding-dot dot-' + severity + '"></div><div class="finding-text"><strong>' + severity.toUpperCase() + '</strong>' + text + '</div></div>'
    ).join('') || '<div style="color:var(--text2);font-size:13px;font-family:var(--mono)">Tidak ada indikator berbahaya ditemukan.</div>';

    document.getElementById('resultArea').innerHTML =
      '<div class="result-card">' +
        '<div class="result-header">' +
          '<div><div class="verdict-badge badge-' + v + '">' + data.verdict + '</div></div>' +
          '<div class="result-meta"><div class="result-url">' + shortInput + '</div><div class="result-summary">' + summaries[v] + '</div></div>' +
          '<div class="score-ring"><svg viewBox="0 0 44 44"><circle class="track" cx="22" cy="22" r="14"/><circle class="fill" cx="22" cy="22" r="14" stroke="' + colors[v] + '" stroke-dasharray="' + c + '" stroke-dashoffset="' + offset + '"/></svg><div class="score-num" style="color:' + colors[v] + '">' + data.score + '</div></div>' +
        '</div>' +
        '<div class="prog-wrap"><div class="prog-bg"><div class="prog-fill" style="width:' + data.score + '%;background:' + colors[v] + '"></div></div></div>' +
        '<div class="findings"><div class="findings-title">Temuan (' + (data.findings||[]).length + ')</div><div class="finding-grid">' + findingsHtml + '</div></div>' +
      '</div>';
  }

  function updateStats(verdict) {
    stats.total++;
    if (verdict === 'safe') stats.safe++;
    else if (verdict === 'suspicious') stats.suspicious++;
    else stats.phishing++;
    document.getElementById('sTotal').textContent = stats.total;
    document.getElementById('sSafe').textContent = stats.safe;
    document.getElementById('sWarn').textContent = stats.suspicious;
    document.getElementById('sDanger').textContent = stats.phishing;
  }

  function addHistory(input, data) {
    history.unshift({ input, data });
    if (history.length > 8) history.pop();
    const dotColors  = { safe: 'var(--green)', suspicious: 'var(--amber)', phishing: 'var(--red)' };
    const badgeBg    = { safe: 'var(--green-bg)', suspicious: 'var(--amber-bg)', phishing: 'var(--red-bg)' };
    const badgeColor = { safe: 'var(--green)', suspicious: 'var(--amber)', phishing: 'var(--red)' };
    document.getElementById('historyList').innerHTML = history.map((h, i) => {
      const hv = h.data.verdict.toLowerCase();
      const short = h.input.length > 55 ? h.input.slice(0, 55) + '...' : h.input;
      return '<div class="history-row" onclick="reloadHistory(' + i + ')">' +
        '<div class="h-dot" style="background:' + dotColors[hv] + '"></div>' +
        '<div class="h-url">' + short + '</div>' +
        '<span class="h-verdict" style="background:' + badgeBg[hv] + ';color:' + badgeColor[hv] + '">' + h.data.verdict + '</span>' +
        '<div class="h-score">' + h.data.score + '/100</div>' +
      '</div>';
    }).join('');
    document.getElementById('historyArea').classList.remove('hidden');
  }

  function reloadHistory(idx) { renderResult(history[idx].data, history[idx].input); }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') doScan(); });
  });
</script>
</body>
</html>
